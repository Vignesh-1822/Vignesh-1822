<svg width="100%" viewBox="0 0 860 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .r { font-family: 'Courier New', monospace; font-size: 11px; fill-opacity: 0; }
      @keyframes fa { 0%{fill-opacity:0} 20%{fill-opacity:0.5} 80%{fill-opacity:0.1} 100%{fill-opacity:0} }
      @keyframes fb { 0%{fill-opacity:0} 25%{fill-opacity:0.4} 75%{fill-opacity:0.08} 100%{fill-opacity:0} }
      @keyframes scan { 0%{x:0} 100%{x:860} }
      @keyframes glow { 0%,100%{opacity:0.6} 50%{opacity:1} }
      @keyframes fadein { from{opacity:0} to{opacity:1} }
    </style>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#071a0f"/>
      <stop offset="100%" stop-color="#050d14"/>
    </linearGradient>
  </defs>

  <rect width="860" height="90" fill="url(#fbg)" rx="14"/>
  <rect width="860" height="90" rx="14" fill="none" stroke="#3fb950" stroke-width="0.5" opacity="0.2"/>

  <!-- Scanline sweep -->
  <rect width="2" height="90" fill="#3fb950" fill-opacity="0.06" rx="1" style="animation:scan 4s linear infinite"/>

  <!-- Rain left -->
  <text class="r" fill="#3fb950" x="14" y="20" style="animation:fa 2.8s ease-in-out 0.2s infinite">1</text>
  <text class="r" fill="#3fb950" x="14" y="38" style="animation:fb 2.8s ease-in-out 0.7s infinite">0</text>
  <text class="r" fill="#3fb950" x="14" y="56" style="animation:fa 2.8s ease-in-out 1.1s infinite">1</text>
  <text class="r" fill="#3fb950" x="14" y="74" style="animation:fb 2.8s ease-in-out 0.4s infinite">0</text>
  <text class="r" fill="#58a6ff" x="32" y="24" style="animation:fb 3.1s ease-in-out 0.9s infinite">fn</text>
  <text class="r" fill="#58a6ff" x="32" y="48" style="animation:fa 3.1s ease-in-out 0.3s infinite">=&gt;</text>
  <text class="r" fill="#58a6ff" x="32" y="72" style="animation:fb 3.1s ease-in-out 1.4s infinite">{}</text>
  <text class="r" fill="#3fb950" x="52" y="16" style="animation:fa 2.5s ease-in-out 0.6s infinite">0</text>
  <text class="r" fill="#3fb950" x="52" y="40" style="animation:fb 2.5s ease-in-out 1.0s infinite">1</text>
  <text class="r" fill="#3fb950" x="52" y="64" style="animation:fa 2.5s ease-in-out 0.1s infinite">1</text>

  <!-- Rain right -->
  <text class="r" fill="#3fb950" x="762" y="20" style="animation:fb 3.0s ease-in-out 0.5s infinite">0</text>
  <text class="r" fill="#3fb950" x="762" y="44" style="animation:fa 3.0s ease-in-out 1.2s infinite">1</text>
  <text class="r" fill="#3fb950" x="762" y="68" style="animation:fb 3.0s ease-in-out 0.3s infinite">0</text>
  <text class="r" fill="#58a6ff" x="782" y="22" style="animation:fa 2.7s ease-in-out 0.8s infinite">[]</text>
  <text class="r" fill="#58a6ff" x="782" y="50" style="animation:fb 2.7s ease-in-out 0.2s infinite">::</text>
  <text class="r" fill="#58a6ff" x="782" y="78" style="animation:fa 2.7s ease-in-out 1.3s infinite">&amp;&amp;</text>
  <text class="r" fill="#3fb950" x="808" y="18" style="animation:fb 3.3s ease-in-out 0.6s infinite">1</text>
  <text class="r" fill="#3fb950" x="808" y="46" style="animation:fa 3.3s ease-in-out 1.0s infinite">0</text>
  <text class="r" fill="#3fb950" x="808" y="74" style="animation:fb 3.3s ease-in-out 0.4s infinite">1</text>
  <text class="r" fill="#58a6ff" x="830" y="28" style="animation:fa 2.9s ease-in-out 0.9s infinite">*</text>
  <text class="r" fill="#58a6ff" x="830" y="56" style="animation:fb 2.9s ease-in-out 0.1s infinite">/</text>
  <text class="r" fill="#58a6ff" x="830" y="80" style="animation:fa 2.9s ease-in-out 1.5s infinite">+</text>

  <!-- Center text -->
  <text font-family="'Courier New', monospace" font-size="11" fill="#3fb950" fill-opacity="0.5" text-anchor="middle" x="430" y="34" style="animation:fadein 1s ease both">// end of file</text>
  <text font-family="'Courier New', monospace" font-size="13" font-weight="600" fill="#58a6ff" text-anchor="middle" x="430" y="56" style="animation:glow 3s ease-in-out infinite">Building things · Available May 2026 · Let's connect</text>
  <text font-family="'Courier New', monospace" font-size="10" fill="#3fb950" fill-opacity="0.4" text-anchor="middle" x="430" y="76" style="animation:fadein 1.5s ease both">UW–Madison  ·  gopalrajend@wisc.edu</text>
</svg>
