<svg width="100%" viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .rain { font-family: 'Courier New', monospace; font-size: 13px; fill-opacity: 0; }
      @keyframes fall0  { 0%{fill-opacity:0;transform:translateY(-30px)} 10%{fill-opacity:0.7} 80%{fill-opacity:0.15} 100%{fill-opacity:0;transform:translateY(30px)} }
      @keyframes fall1  { 0%{fill-opacity:0;transform:translateY(-20px)} 10%{fill-opacity:0.6} 80%{fill-opacity:0.1}  100%{fill-opacity:0;transform:translateY(30px)} }
      @keyframes fall2  { 0%{fill-opacity:0;transform:translateY(-40px)} 15%{fill-opacity:0.5} 75%{fill-opacity:0.08} 100%{fill-opacity:0;transform:translateY(25px)} }
      @keyframes typing { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0% 0 0)} }
      @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes glow   { 0%,100%{fill-opacity:0.9} 50%{fill-opacity:0.5} }
      @keyframes fadein { from{opacity:0} to{opacity:1} }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#050d14"/>
      <stop offset="100%" stop-color="#071a0f"/>
    </linearGradient>
    <linearGradient id="namegrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="55%" stop-color="#79c0ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <clipPath id="nameClip">
      <rect x="90" y="60" width="560" height="70"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" fill="url(#bg)" rx="14"/>

  <!-- Border glow -->
  <rect width="860" height="200" rx="14" fill="none" stroke="#3fb950" stroke-width="0.5" opacity="0.25"/>

  <!-- Dashed separator lines -->
  <line x1="75" y1="20" x2="75" y2="180" stroke="#3fb950" stroke-width="0.4" stroke-dasharray="3,4" opacity="0.3"/>
  <line x1="748" y1="20" x2="748" y2="180" stroke="#3fb950" stroke-width="0.4" stroke-dasharray="3,4" opacity="0.3"/>

  <!-- LEFT RAIN — col 1: binary -->
  <text class="rain" fill="#3fb950" x="12" y="20"  style="animation:fall0 3.1s ease-in-out 0.0s infinite">1</text>
  <text class="rain" fill="#3fb950" x="12" y="40"  style="animation:fall1 3.1s ease-in-out 0.3s infinite">0</text>
  <text class="rain" fill="#3fb950" x="12" y="60"  style="animation:fall2 3.1s ease-in-out 0.6s infinite">1</text>
  <text class="rain" fill="#3fb950" x="12" y="80"  style="animation:fall0 3.1s ease-in-out 0.9s infinite">0</text>
  <text class="rain" fill="#3fb950" x="12" y="100" style="animation:fall1 3.1s ease-in-out 1.2s infinite">1</text>
  <text class="rain" fill="#3fb950" x="12" y="120" style="animation:fall2 3.1s ease-in-out 0.5s infinite">1</text>
  <text class="rain" fill="#3fb950" x="12" y="140" style="animation:fall0 3.1s ease-in-out 0.2s infinite">0</text>
  <text class="rain" fill="#3fb950" x="12" y="160" style="animation:fall1 3.1s ease-in-out 0.8s infinite">1</text>
  <text class="rain" fill="#3fb950" x="12" y="180" style="animation:fall2 3.1s ease-in-out 1.4s infinite">0</text>
  <!-- LEFT RAIN — col 2: syntax -->
  <text class="rain" fill="#58a6ff" x="32" y="15"  style="animation:fall1 2.7s ease-in-out 0.4s infinite">{</text>
  <text class="rain" fill="#58a6ff" x="32" y="38"  style="animation:fall2 2.7s ease-in-out 0.9s infinite">}</text>
  <text class="rain" fill="#58a6ff" x="32" y="60"  style="animation:fall0 2.7s ease-in-out 1.1s infinite">;</text>
  <text class="rain" fill="#58a6ff" x="32" y="82"  style="animation:fall1 2.7s ease-in-out 0.2s infinite">(</text>
  <text class="rain" fill="#58a6ff" x="32" y="104" style="animation:fall2 2.7s ease-in-out 0.7s infinite">)</text>
  <text class="rain" fill="#58a6ff" x="32" y="126" style="animation:fall0 2.7s ease-in-out 1.3s infinite">=</text>
  <text class="rain" fill="#58a6ff" x="32" y="148" style="animation:fall1 2.7s ease-in-out 0.0s infinite">&gt;</text>
  <text class="rain" fill="#58a6ff" x="32" y="170" style="animation:fall2 2.7s ease-in-out 0.5s infinite">[</text>
  <text class="rain" fill="#58a6ff" x="32" y="192" style="animation:fall0 2.7s ease-in-out 1.0s infinite">]</text>
  <!-- LEFT RAIN — col 3: binary -->
  <text class="rain" fill="#3fb950" x="54" y="25"  style="animation:fall2 3.4s ease-in-out 0.6s infinite">0</text>
  <text class="rain" fill="#3fb950" x="54" y="50"  style="animation:fall0 3.4s ease-in-out 1.0s infinite">1</text>
  <text class="rain" fill="#3fb950" x="54" y="75"  style="animation:fall1 3.4s ease-in-out 0.3s infinite">1</text>
  <text class="rain" fill="#3fb950" x="54" y="100" style="animation:fall2 3.4s ease-in-out 0.8s infinite">0</text>
  <text class="rain" fill="#3fb950" x="54" y="125" style="animation:fall0 3.4s ease-in-out 1.5s infinite">0</text>
  <text class="rain" fill="#3fb950" x="54" y="150" style="animation:fall1 3.4s ease-in-out 0.1s infinite">1</text>
  <text class="rain" fill="#3fb950" x="54" y="175" style="animation:fall2 3.4s ease-in-out 0.4s infinite">0</text>

  <!-- RIGHT RAIN — col 1 -->
  <text class="rain" fill="#3fb950" x="756" y="20"  style="animation:fall0 2.9s ease-in-out 0.2s infinite">0</text>
  <text class="rain" fill="#3fb950" x="756" y="44"  style="animation:fall1 2.9s ease-in-out 0.7s infinite">1</text>
  <text class="rain" fill="#3fb950" x="756" y="68"  style="animation:fall2 2.9s ease-in-out 1.2s infinite">0</text>
  <text class="rain" fill="#3fb950" x="756" y="92"  style="animation:fall0 2.9s ease-in-out 0.4s infinite">0</text>
  <text class="rain" fill="#3fb950" x="756" y="116" style="animation:fall1 2.9s ease-in-out 0.9s infinite">1</text>
  <text class="rain" fill="#3fb950" x="756" y="140" style="animation:fall2 2.9s ease-in-out 0.0s infinite">1</text>
  <text class="rain" fill="#3fb950" x="756" y="164" style="animation:fall0 2.9s ease-in-out 1.4s infinite">0</text>
  <text class="rain" fill="#3fb950" x="756" y="188" style="animation:fall1 2.9s ease-in-out 0.6s infinite">1</text>
  <!-- RIGHT RAIN — col 2: keywords -->
  <text class="rain" fill="#58a6ff" x="776" y="18"  style="animation:fall1 3.2s ease-in-out 0.5s infinite">fn</text>
  <text class="rain" fill="#58a6ff" x="776" y="45"  style="animation:fall2 3.2s ease-in-out 1.1s infinite">if</text>
  <text class="rain" fill="#58a6ff" x="776" y="72"  style="animation:fall0 3.2s ease-in-out 0.3s infinite">=&gt;</text>
  <text class="rain" fill="#58a6ff" x="776" y="99"  style="animation:fall1 3.2s ease-in-out 0.8s infinite">[]</text>
  <text class="rain" fill="#58a6ff" x="776" y="126" style="animation:fall2 3.2s ease-in-out 1.5s infinite">{}</text>
  <text class="rain" fill="#58a6ff" x="776" y="153" style="animation:fall0 3.2s ease-in-out 0.1s infinite">::</text>
  <text class="rain" fill="#58a6ff" x="776" y="180" style="animation:fall1 3.2s ease-in-out 0.6s infinite">&amp;&amp;</text>
  <!-- RIGHT RAIN — col 3 -->
  <text class="rain" fill="#3fb950" x="804" y="30"  style="animation:fall2 3.6s ease-in-out 0.9s infinite">1</text>
  <text class="rain" fill="#3fb950" x="804" y="58"  style="animation:fall0 3.6s ease-in-out 0.4s infinite">0</text>
  <text class="rain" fill="#3fb950" x="804" y="86"  style="animation:fall1 3.6s ease-in-out 1.0s infinite">1</text>
  <text class="rain" fill="#3fb950" x="804" y="114" style="animation:fall2 3.6s ease-in-out 0.2s infinite">0</text>
  <text class="rain" fill="#3fb950" x="804" y="142" style="animation:fall0 3.6s ease-in-out 1.3s infinite">1</text>
  <text class="rain" fill="#3fb950" x="804" y="170" style="animation:fall1 3.6s ease-in-out 0.7s infinite">0</text>
  <!-- RIGHT RAIN — col 4: operators -->
  <text class="rain" fill="#58a6ff" x="828" y="22"  style="animation:fall0 2.8s ease-in-out 0.3s infinite">&lt;</text>
  <text class="rain" fill="#58a6ff" x="828" y="48"  style="animation:fall1 2.8s ease-in-out 0.8s infinite">&gt;</text>
  <text class="rain" fill="#58a6ff" x="828" y="74"  style="animation:fall2 2.8s ease-in-out 1.4s infinite">!</text>
  <text class="rain" fill="#58a6ff" x="828" y="100" style="animation:fall0 2.8s ease-in-out 0.1s infinite">?</text>
  <text class="rain" fill="#58a6ff" x="828" y="126" style="animation:fall1 2.8s ease-in-out 0.6s infinite">*</text>
  <text class="rain" fill="#58a6ff" x="828" y="152" style="animation:fall2 2.8s ease-in-out 1.1s infinite">/</text>
  <text class="rain" fill="#58a6ff" x="828" y="178" style="animation:fall0 2.8s ease-in-out 0.5s infinite">+</text>

  <!-- Terminal prompt -->
  <text font-family="'Courier New', monospace" font-size="13" fill="#3fb950" fill-opacity="0.7" x="90" y="76" style="animation:fadein 0.8s ease 0.2s both">~/dev $</text>

  <!-- Name with gradient + typewriter clip -->
  <text font-family="'Courier New', monospace" font-size="38" font-weight="700" fill="url(#namegrad)" x="90" y="122" clip-path="url(#nameClip)" style="animation:typing 1.8s steps(28,end) 0.5s both">Vignesh Gopal Rajendran</text>

  <!-- Blinking cursor -->
  <rect x="533" y="92" width="3" height="33" fill="#3fb950" style="animation:blink 1s step-end 2.4s infinite"/>

  <!-- Subtitle -->
  <text font-family="'Courier New', monospace" font-size="13" fill="#8b949e" x="90" y="152" style="animation:fadein 1s ease 2.2s both">Full Stack  ·  DevOps  ·  AI / LLM  ·  UW–Madison '26</text>

  <!-- Version tag -->
  <text font-family="'Courier New', monospace" font-size="10" fill="#3fb950" x="696" y="188" style="animation:glow 3s ease-in-out infinite">v2.0.26_release</text>
</svg>
